name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          cache: npm

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\electron
          key: electron-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild native modules
        run: npm run rebuild

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: React Doctor
        run: npx react-doctor@latest -y --json

      - name: Build app
        run: npm run build

      - name: Build distributable
        run: .\node_modules\.bin\electron-builder.cmd --win --publish never

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: |
            release/*.exe
            release/latest.yml
            release/*.blockmap
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-windows
    permissions:
      contents: write

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: release-assets

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-assets/* --repo "$GH_REPO" --clobber
          else
            gh release create "$TAG_NAME" release-assets/* --repo "$GH_REPO" --title "$TAG_NAME" --generate-notes
          fi
